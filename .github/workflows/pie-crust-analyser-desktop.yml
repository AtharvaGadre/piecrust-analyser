name: Pie Crust Analyser Desktop Build

on:
  push:
    branches: ["main", "master"]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            rid: osx-arm64
            artifact_name: pie-crust-analyser-macos-arm64
            archive_glob: publish/*.zip
            allow_failure: false
          - os: macos-13
            rid: osx-x64
            artifact_name: pie-crust-analyser-macos-x64
            archive_glob: publish/*.zip
            allow_failure: true
          - os: windows-latest
            rid: win-x64
            artifact_name: pie-crust-analyser-windows-x64
            archive_glob: publish/*.zip
            allow_failure: false
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: pie-crust-analyser-linux-x64
            archive_glob: publish/*.zip
            allow_failure: false

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish self-contained desktop bundle
        run: >
          dotnet publish
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/${{ matrix.artifact_name }}/raw

      - name: Package macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP_ROOT="publish/${{ matrix.artifact_name }}/Pie Crust Analyser.app"
          mkdir -p "$APP_ROOT/Contents/MacOS" "$APP_ROOT/Contents/Resources"
          cp -R publish/${{ matrix.artifact_name }}/raw/* "$APP_ROOT/Contents/MacOS/"
          cat > "$APP_ROOT/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Pie Crust Analyser</string>
            <key>CFBundleDisplayName</key>
            <string>Pie Crust Analyser</string>
            <key>CFBundleIdentifier</key>
            <string>com.piecrustanalyser.desktop</string>
            <key>CFBundleVersion</key>
            <string>${APP_VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${APP_VERSION}</string>
            <key>CFBundleExecutable</key>
            <string>PieCrustAnalyser</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
          </dict>
          </plist>
          # Ad-hoc sign the bundle so the app structure is internally consistent.
          # Full notarization still requires Apple Developer credentials.
          codesign --force --deep --sign - "$APP_ROOT"
          rm -f "publish/${{ matrix.artifact_name }}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_ROOT" "publish/${{ matrix.artifact_name }}.zip"

      - name: Package Windows bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "publish/${{ matrix.artifact_name }}/raw/*" -DestinationPath "publish/${{ matrix.artifact_name }}.zip" -Force

      - name: Package Linux bundle
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cat > publish/${{ matrix.artifact_name }}/raw/pie-crust-analyser.desktop <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=Pie Crust Analyser
          Exec=./PieCrustAnalyser
          Terminal=false
          Categories=Science;
          DESKTOP
          cd publish/${{ matrix.artifact_name }}
          zip -r "../${{ matrix.artifact_name }}.zip" raw

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_glob }}

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-desktop
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/**/*.zip
